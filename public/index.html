<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <title>Futbol İstatistik Sistemi</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
      <div class="container">
        <span class="navbar-brand">Futbol Takip Sistemi</span>
      </div>
    </nav>

    <div id="app" class="container">
      <div id="auth-section" class="row justify-content-center">
        <div class="col-md-4">
          <div class="card p-4 shadow">
            <h3 class="text-center mb-4">Giriş Yap</h3>
            <input
              type="email"
              id="login-email"
              class="form-control mb-2"
              placeholder="E-posta"
            />
            <input
              type="password"
              id="login-password"
              class="form-control mb-3"
              placeholder="Şifre"
            />
            <button onclick="login()" class="btn btn-primary w-100">
              Giriş
            </button>
            <hr />
            <p class="text-center small">
              Hesabın yok mu? <a href="#" onclick="showRegister()">Kayıt Ol</a>
            </p>
          </div>
        </div>
      </div>
      <div id="main-content" style="display: none">
        <div
          id="admin-actions"
          class="card p-3 mb-4 shadow-sm"
          style="display: none"
        >
          <h5>Yeni Futbolcu Ekle</h5>
          <div class="row g-2">
            <div class="col-md-3">
              <input
                type="text"
                id="p-name"
                class="form-control"
                placeholder="Ad Soyad"
              />
            </div>
            <div class="col-md-3">
              <input
                type="text"
                id="p-team"
                class="form-control"
                placeholder="Takım"
              />
            </div>
            <div class="col-md-2">
              <input
                type="number"
                id="p-goals"
                class="form-control"
                placeholder="Gol"
              />
            </div>
            <div class="col-md-2">
              <input
                type="number"
                id="p-assists"
                class="form-control"
                placeholder="Asist"
              />
            </div>
            <div class="col-md-2">
              <button onclick="addPlayer()" class="btn btn-success w-100">
                Ekle
              </button>
            </div>
          </div>
        </div>

        <div id="player-list-container"></div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
